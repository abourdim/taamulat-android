  FULL_DESC_AR: '⚖ الإسلام وقانون الأحوال الشخصية — تطبيق تفاعلي


    تطبيق تفاعلي ثلاثي اللغة (عربي/إنجليزي/فرنسي) مستوحى من كتاب "الإسلام وقانون الأحوال الشخصية" للشيخ محمد الغزالي رحمه
    الله (1917–1996).


    📚 عن الكتاب


    يعرض هذا التطبيق محتوى الكتاب بأسلوب بصري معاصر، منظما على فصوله ومواضيعه. يهدف إلى تقريب فكر الشيخ الغزالي للقارئ المعاصر،
    وإتاحته بثلاث لغات.


    ✨ المزايا


    • محتوى الكتاب منظم على فصوله

    • ثلاث لغات: عربية، إنجليزية، فرنسية

    • ثلاث سمات لونية

    • وضع القراءة، قارئ صوتي، واجهة عربية بدعم كامل (RTL)

    • يعمل بدون اتصال بالإنترنت


    🕌 إخلاء مسؤولية


    لست عالما في الشريعة. هذا جهد متواضع من أب مسلم لنشر حكمة الشيخ الغزالي بأسلوب تفاعلي. المحتوى مستمد من الكتاب ومصادر
    إسلامية موثوقة. هذا ليس فتوى.


    📖 المصادر


    • كتاب "الإسلام وقانون الأحوال الشخصية" — الشيخ محمد الغزالي

    • القرآن الكريم والسنة النبوية الصحيحة


    رحم الله الشيخ محمد الغزالي وجزاه عنا خير الجزاء 🤲


    —

    Powered by workshop-diy.org

    '
  FULL_DESC_EN: '⚖ Al Islam wa Qanun — Islam & Personal Status Law


    Interactive trilingual app (Arabic / English / French) based on the book "Islam & Personal Status Law" by Sheikh Mohammed
    al-Ghazali (1917–1996).


    📚 About the book


    This app presents the book''s content with modern visual design, organized chapter by chapter. It aims to bring Sheikh
    al-Ghazali''s thought to today''s reader, accessible in three languages.


    ✨ Features


    • Content organized by the book''s chapters

    • Three languages: Arabic, English, French

    • Three color themes

    • Reading mode, audio narrator, full RTL Arabic support

    • Works offline — no internet required


    🕌 Disclaimer


    I am not a scholar. This is a humble effort by a Muslim parent to share Sheikh al-Ghazali''s wisdom interactively. Content
    is derived from the book and trusted Islamic sources. This is not a fatwa.


    📖 Sources


    • "Islam & Personal Status Law" — Sheikh Mohammed al-Ghazali

    • The Holy Quran and authentic Sunnah


    May Allah have mercy on Sheikh al-Ghazali and reward him 🤲


    —

    Powered by workshop-diy.org

