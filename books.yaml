  FULL_DESC_EN: '📖 Zalam min al-Gharb — Darkness from the West


    Interactive trilingual app (Arabic / English / French) based on the book "Darkness from the West" by Sheikh Mohammed al-Ghazali
    (1917–1996).


    📚 About the book


    This app presents the book''s content with modern visual design, organized chapter by chapter. It aims to bring Sheikh
    al-Ghazali''s thought to today''s reader, accessible in three languages.


    ✨ Features


    • Content organized by the book''s chapters

    • Three languages: Arabic, English, French

    • Three color themes

    • Reading mode, audio narrator, full RTL Arabic support

    • Works offline — no internet required


    🕌 Disclaimer


    I am not a scholar. This is a humble effort by a Muslim parent to share Sheikh al-Ghazali''s wisdom interactively. Content
    is derived from the book and trusted Islamic sources. This is not a fatwa.


    📖 Sources


    • "Darkness from the West" — Sheikh Mohammed al-Ghazali

    • The Holy Quran and authentic Sunnah


    May Allah have mercy on Sheikh al-Ghazali and reward him 🤲


    —

