  FULL_DESC_AR: '📜 فقه السيرة — تطبيق تفاعلي


    تطبيق تفاعلي ثلاثي اللغة (عربي/إنجليزي/فرنسي) مستوحى من كتاب "فقه السيرة" للشيخ محمد الغزالي رحمه الله (1917–1996).


    📚 عن الكتاب


    يعرض هذا التطبيق محتوى الكتاب بأسلوب بصري معاصر، منظما على فصوله ومواضيعه. يهدف إلى تقريب فكر الشيخ الغزالي للقارئ المعاصر،
