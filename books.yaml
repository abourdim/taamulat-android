  FULL_DESC_FR: '🌟 Khuluq al-Muslim — Le Caractère du Musulman


    Application interactive trilingue (arabe / anglais / français) inspirée du livre « Le Caractère du Musulman » (Khuluq
    al-Muslim) du Cheikh Mohammed al-Ghazali (1917–1996).


    📚 À propos du livre


    « Le Caractère du Musulman » dresse la carte des grandes vertus islamiques au fil de chapitres organisés : véracité, probité,
    pudeur, miséricorde, justice, patience, indulgence, générosité d''âme, humilité, et bien d''autres. Chaque vertu a son
    chapitre propre, étayé par des preuves tirées du Saint Coran et de la Sunna authentique.


    ✨ Fonctionnalités


    • Chaque vertu présentée en fiche structurée selon les chapitres du livre

    • Versets coraniques et hadiths authentiques pour chaque vertu

    • Trois langues : arabe, anglais, français

    • Trois thèmes visuels

    • Mode lecture, narrateur audio, prise en charge complète de l''arabe (RTL)

    • Fonctionne hors ligne — aucune connexion requise


    🕌 Avertissement


    Je ne suis pas un savant. Il s''agit d''un modeste effort d''un parent musulman pour partager la sagesse du Cheikh al-Ghazali
    de manière interactive. Le contenu est tiré du livre et de sources islamiques fiables. Ceci n''est pas une fatwa.


    📖 Sources


